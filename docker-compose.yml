# AnalytIQ — production-style compose (optional; two-terminal dev is the
# primary workflow, see README). SQLite lives on a named volume; nginx (web)
# serves the built client and proxies /api/* to Flask.
services:
  api:
    build: server
    restart: unless-stopped
    environment:
      DATABASE_PATH: /data/analytiq.db
    volumes:
      - appdata:/data

  web:
    build: client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  appdata:
